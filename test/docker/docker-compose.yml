services:
  server:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.server
    container_name: bssh-server
    hostname: server
    networks:
      bssh-net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD", "pgrep", "sshd"]
      interval: 2s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ../..
      dockerfile: test/docker/Dockerfile.client
    container_name: bssh-client
    hostname: client
    networks:
      bssh-net:
        ipv4_address: 172.28.0.20
    depends_on:
      server:
        condition: service_healthy
    cap_add:
      - NET_ADMIN  # Required for network manipulation (tc, iptables)
    privileged: true  # Required for iptables

networks:
  bssh-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
